<!DOCTYPE html>
<html lang="en">

<head>

    <!-- Meta -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Title -->
    <title>Aakhyaan Foundation</title>

    <!-- Font Awesome -->
     <link href="https://unpkg.com/lucide-static@latest/font/lucide.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Main CSS -->
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/banner.css">
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="css/signup.css">
    <link rel="stylesheet" href="css/footer.css">
    <link rel="stylesheet" href="css/floating.css">
    <link rel="stylesheet" href="./css/press-coverage.css">

</head>

<body>

    <div id="header"></div>



<section class="press-admin-section">
    <div class="press-header">
      <h1>Our Press Coverage</h1>
      <p>
        Discover the latest news, media coverage, and stories highlighting 
        Aakhyaan Foundation's commitment to empowering and supporting 
        senior citizens with dignity and care.
      </p>
    </div>

    <div class="press-grid" id="pressGrid"></div>
</section>

 <!-- hidden file input -->
  <input type="file" id="pressFileInput" accept="image/*" hidden />

  <!-- image popup -->
<div class="image-modal" id="imageModal">
    <button class="modal-close" id="modalClose">
      <i class="fa-solid fa-xmark"></i>
    </button>
    <img id="modalImage" src="" alt="Press Coverage" />
</div>




<div id="footer"></div>
<div id="floating-icons"></div>

    <!-- JS -->
    <script src="js/header.js"></script>
    <script src="js/navbar.js"></script>
    <script src="js/login.js"></script>
    <script src="js/signup.js"></script>
    <script src="js/footer.js"></script>
    <script src="js/floating.js"></script>
    <script src="./js/press-coverage.js"></script>


</body>

</html>
