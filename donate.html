<!-- ==========================================
            DONATION SECTION START
=========================================== -->

<section class="donation-section">
    <div class="donation-container">
        <div class="donation-wrapper">

            <div class="donation-form">
                <div class="donation-title">
                    <p>You can make your donation through this form.</p>
                </div>

                <form id="donationForm" enctype="multipart/form-data">

                    <div class="form-group">
                        <label>Full Name <span>*</span></label>
                        <input type="text" id="fullName" name="fullName" placeholder="Enter Full Name">
                    </div>

                    <div class="form-group">
                        <label>Mobile Number <span>*</span></label>
                        <input type="tel" id="mobile" name="mobile" placeholder="Enter Mobile Number">
                    </div>

                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="email" name="email" placeholder="Enter Email">
                    </div>

                    <div class="form-group">
                        <label>PAN Card Number</label>
                        <input type="text" id="panNumber" name="panNumber" placeholder="Enter PAN Number">
                    </div>

                    <div class="form-group">
                        <label>Address <span>*</span></label>
                        <textarea id="address" name="address" placeholder="Enter Address"></textarea>
                    </div>

                    <div class="form-group">
                        <label>Photo (Optional)</label>
                        <div class="upload-box-small">
                            <i class="fas fa-plus"></i>
                            <p>Upload Photo</p>
                            <input type="file" id="photo" name="photo" accept="image/*">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Donation Amount <span>*</span></label>
                        <input type="number" id="donationAmount" name="donationAmount" placeholder="₹ Enter Amount">
                    </div>

                    <div class="form-group">
                        <label>Document Type <span>*</span></label>
                        <select id="documentType" name="documentType">
                            <option value="">Select Document</option>
                            <option value="Aadhar Card">Aadhar Card</option>
                            <option value="PAN Card">PAN Card</option>
                            <option value="Driving Licence">Driving Licence</option>
                            <option value="Passport">Passport</option>
                            <option value="Voter ID">Voter ID</option>
                        </select>
                    </div>

                    <div class="form-group full-width">
                        <label>Document Number <span>*</span></label>
                        <input type="text" id="documentNumber" name="documentNumber" placeholder="Enter Document Number">
                    </div>

                    <div class="form-group">
                        <label>Document Front</label>
                        <div class="upload-box-small">
                            <i class="fas fa-plus"></i>
                            <p>Upload Front</p>
                            <input type="file" id="documentFront" name="documentFront" accept="image/*">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Document Back</label>
                        <div class="upload-box-small">
                            <i class="fas fa-plus"></i>
                            <p>Upload Back</p>
                            <input type="file" id="documentBack" name="documentBack" accept="image/*">
                        </div>
                    </div>

                    <button type="submit" class="donate-btn">
                        Donate Now
                    </button>

                </form>
            </div>

            <div class="donation-upload">
                <div class="donation-card">

                    <div class="donation-card-top">
                        <div class="donation-card-top">
                            <div class="upi-row">
                                <span>Name :</span>
                                <strong>Aakhyaan Foundation</strong>
                            </div>
                            <div class="upi-row">
                                <span>UPI ID :</span>
                                <strong>9001123836@sbi</strong>
                            </div>
                        </div>
                    </div>

                    <div class="donation-card-body">
                        <img src="img/donation.jpeg" class="qr-image" alt="QR Code">

                        <div class="upi-apps">
                            <img src="img/gpay.png" alt="Google Pay">
                            <img src="img/phonepe.png" alt="PhonePe">
                            <img src="img/paytm.png" alt="Paytm">
                        </div>
                    </div>

                    <div class="donation-card-footer">
                        Thank you for your support!
                    </div>

                </div>
            </div>

        </div>
    </div>
</section>
