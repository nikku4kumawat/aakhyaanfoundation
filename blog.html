<!DOCTYPE html>
<html lang="en">

<head>

    <!-- Meta -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Title -->
    <title>Aakhyaan Foundation</title>

    <!-- Font Awesome -->
     <link href="https://unpkg.com/lucide-static@latest/font/lucide.css" rel="stylesheet">
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />    
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Main CSS -->
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/banner.css">
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="css/signup.css">
    <link rel="stylesheet" href="css/footer.css">
    <link rel="stylesheet" href="css/floating.css">
    <link rel="stylesheet" href="./css/blog.css">

</head>

<body>

    <div id="header"></div>


<section class="blog-admin-section">
    <div class="blog-header">
      <h1>Our Blog</h1>
      <p>
        Discover inspiring stories, impactful initiatives, community updates, 
        and meaningful insights from Aakhyaan Foundation as we work to empower individuals,
         support senior citizens, and build a more inclusive and compassionate society.
      </p>
    </div>

    <div class="blog-grid" id="blogGrid"></div>
</section>

  <input type="file" id="blogFileInput" accept="image/*" hidden />

  <div class="blog-image-modal" id="blogImageModal">
    <button class="blog-modal-close" id="blogModalClose">
      <i class="fa-solid fa-xmark"></i>
    </button>
    <img id="blogModalImage" src="" alt="Blog Image" />
  </div>





<div id="footer"></div>
<div id="floating-icons"></div>

    <!-- JS -->
    <script src="js/header.js"></script>
    <script src="js/navbar.js"></script>
    <script src="js/login.js"></script>
    <script src="js/signup.js"></script>
    <script src="js/footer.js"></script>
    <script src="js/floating.js"></script>
    <script src="./js/blog.js"></script>


</body>

</html>
