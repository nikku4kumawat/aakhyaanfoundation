<!DOCTYPE html>
<html lang="en">

<head>

    <!-- Meta -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Title -->
    <title>Aakhyaan Foundation</title>

    <!-- Font Awesome -->
     <link href="https://unpkg.com/lucide-static@latest/font/lucide.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Main CSS -->
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/banner.css">
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="css/signup.css">
    <link rel="stylesheet" href="css/footer.css">
    <link rel="stylesheet" href="css/floating.css">
    <link rel="stylesheet" href="css/focus-area.css">

</head>

<body>

    <div id="header"></div>

<!--=========================================
        FOCUS AREA SECTION
==========================================-->

<section class="focus-area-section">

    <div class="container">

        <div class="focus-wrapper">

            <!-- Left Image -->

            <div class="focus-image">

                <img src="img/focus-area.png" alt="Focus Area">

            </div>

            <!-- Right Content -->

            <div class="focus-content">

                <h2 class="focus-title">
                    <i class="fas fa-map-marker-alt"></i>
                    Focus Area
                </h2>

                <div class="focus-boxes">

                    <div class="focus-box">
                        Rajasthan
                    </div>

                    <div class="focus-box">
                        Madhya Pradesh
                    </div>

                    <div class="focus-box">
                        Uttar Pradesh
                    </div>

                </div>

            </div>

        </div>

    </div>

</section>





<div id="footer"></div>
<div id="floating-icons"></div>

    <!-- JS -->
    <script src="js/header.js"></script>
    <script src="js/navbar.js"></script>
    <script src="js/login.js"></script>
    <script src="js/signup.js"></script>
    <script src="js/footer.js"></script>
    <script src="js/floating.js"></script>
    <script src="js/focus-area.js"></script>


</body>

</html>
